apiVersion: v1
kind: Service
metadata:
  name: {{ include "icap-mock.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "icap-mock.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "icap-mock.selectorLabels" . | nindent 4 }}
  ports:
    {{- if eq .Values.icap.mode "single" }}
    - name: icap
      port: {{ .Values.service.icapPort }}
      targetPort: icap
      protocol: TCP
    {{- else }}
    {{- range $name, $srv := .Values.icap.servers }}
    - name: icap-{{ $name }}
      port: {{ $srv.port }}
      targetPort: icap-{{ $name }}
      protocol: TCP
    {{- end }}
    {{- end }}
    - name: health
      port: {{ .Values.service.healthPort }}
      targetPort: health
      protocol: TCP
    - name: metrics
      port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
    {{- range .Values.service.extraPorts }}
    - name: {{ .name }}
      port: {{ .port }}
      targetPort: {{ .targetPort }}
      protocol: {{ .protocol | default "TCP" }}
    {{- end }}

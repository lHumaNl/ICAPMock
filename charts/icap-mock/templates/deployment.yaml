apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "icap-mock.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "icap-mock.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "icap-mock.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "icap-mock.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Re-roll the deployment when the ConfigMap content changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "icap-mock.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: icap-mock
          image: {{ include "icap-mock.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args:
            - --config
            - {{ .Values.icap.configFile }}
          ports:
            {{- if eq .Values.icap.mode "single" }}
            - name: icap
              containerPort: {{ .Values.icap.port }}
              protocol: TCP
            {{- else }}
            {{- range $name, $srv := .Values.icap.servers }}
            - name: icap-{{ $name }}
              containerPort: {{ $srv.port }}
              protocol: TCP
            {{- end }}
            {{- end }}
            - name: health
              containerPort: {{ .Values.health.port }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          env:
            - name: ICAP_SERVER_HOST
              value: {{ .Values.icap.host | quote }}
            - name: ICAP_HEALTH_PORT
              value: {{ .Values.health.port | quote }}
            - name: ICAP_METRICS_PORT
              value: {{ .Values.metrics.port | quote }}
            - name: ICAP_METRICS_ENABLED
              value: {{ .Values.metrics.enabled | quote }}
            - name: ICAP_STORAGE_ENABLED
              value: {{ .Values.storage.enabled | quote }}
            - name: ICAP_RATE_LIMIT_ENABLED
              value: {{ .Values.rateLimit.enabled | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.logging.level | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            # Main config file
            - name: config
              mountPath: /app/configs/config.yaml
              subPath: config.yaml
              readOnly: true
            # Scenario files — each key in .Values.scenarios is mounted as a file
            {{- range $filename, $_ := .Values.scenarios }}
            - name: config
              mountPath: {{ printf "/app/configs/scenarios/%s" $filename }}
              subPath: {{ $filename }}
              readOnly: true
            {{- end }}
            # Extra config files
            {{- range $key, $_ := .Values.extraConfigs }}
            - name: config
              mountPath: {{ printf "/app/configs/%s" $key }}
              subPath: {{ $key }}
              readOnly: true
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: {{ .Values.tls.mountPath }}
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "icap-mock.fullname" . }}
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.tls.secretName }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
